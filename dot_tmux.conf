# =============================================================================
# tmux configuration (最小構成)
#
# 方針: tmux は基本 SSH 先専用。キーバインドはすべてデフォルト(prefix=C-b 等)の
# ままにして、設定ファイルが無い remote とローカルの「指の動き」を完全一致させる。
# ここに残すのはキー操作に影響しない見た目・QoL だけ。
# =============================================================================

# --- truecolor (WezTerm 内で色を正しく出す。remote には影響しない) ---
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# --- QoL (キーバインドは変えない) ---
set -g mouse on
set -g history-limit 10000
set -sg escape-time 0
